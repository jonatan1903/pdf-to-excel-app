services:
  - type: web
    name: pdf-to-excel-web
    env: python
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: pdf-to-excel-redis
          property: connectionString
      - key: QUEUE_NAME
        value: pdf-jobs
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: JOB_TIMEOUT_SECONDS
        value: 7200
      - key: JOB_TTL_SECONDS
        value: 604800

  - type: worker
    name: pdf-to-excel-worker
    env: python
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: pdf-to-excel-redis
          property: connectionString
      - key: QUEUE_NAME
        value: pdf-jobs
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: JOB_TIMEOUT_SECONDS
        value: 7200
      - key: JOB_TTL_SECONDS
        value: 604800

  - type: keyvalue
    name: pdf-to-excel-redis
    ipAllowList: []
