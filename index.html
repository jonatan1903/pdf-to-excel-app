<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de PDF Institucional a Excel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 {
            margin-bottom: 2rem;
            color: #2c3e50;
        }
        .upload-area {
            border: 2px dashed #3498db;
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            transition: background-color 0.3s ease;
        }
        .upload-area:hover {
            background-color: #f1f8ff;
        }
        #file-input {
            display: none;
        }
        .file-label {
            cursor: pointer;
            color: #3498db;
            font-weight: 600;
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #3498db;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .file-label:hover {
            background-color: #3498db;
            color: #fff;
        }
        .process-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s ease;
            display: none; /* Initially hidden */
        }
        .process-btn:hover {
            background-color: #27ae60;
        }
        .process-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .loader {
            display: none;
            margin-top: 15px;
            color: #7f8c8d;
        }
        .loader .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        .status-box {
            display: none;
            text-align: left;
            margin-top: 18px;
            border: 1px solid #dfe6ee;
            border-radius: 8px;
            padding: 12px;
            background: #fafcff;
        }
        .status-box p {
            margin: 6px 0;
            font-size: 14px;
        }
        .status-ok {
            color: #1e8449;
            font-weight: 600;
        }
        .status-error {
            color: #c0392b;
            font-weight: 600;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #file-name {
            display: block;
            margin-top: 10px;
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Procesador de PDFs Institucionales</h2>
    
    <div class="upload-area">
        <input type="file" id="file-input" accept="application/pdf">
        <label for="file-input" class="file-label">Seleccionar documento PDF</label>
        <span id="file-name">Ningún archivo seleccionado</span>
    </div>

    <button id="process-btn" class="process-btn">Subir y Procesar</button>
    
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <span id="loader-text">Creando job de procesamiento...</span>
    </div>

    <div id="status-box" class="status-box">
        <p><strong>Job ID:</strong> <span id="job-id">-</span></p>
        <p><strong>Estado:</strong> <span id="job-status">-</span></p>
        <p id="job-stats">Esperando informacion...</p>
        <p id="job-error"></p>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    const processBtn = document.getElementById('process-btn');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');

    const statusBox = document.getElementById('status-box');
    const jobIdEl = document.getElementById('job-id');
    const jobStatusEl = document.getElementById('job-status');
    const jobStatsEl = document.getElementById('job-stats');
    const jobErrorEl = document.getElementById('job-error');

    const POLLING_MS = 3000;
    let pollTimer = null;
    let currentJobId = null;

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    function setProcessing(isProcessing, message) {
        processBtn.disabled = isProcessing;
        loader.style.display = isProcessing ? 'block' : 'none';
        loaderText.textContent = message || 'Procesando...';
        processBtn.textContent = isProcessing ? 'Procesando...' : 'Subir y Procesar';
    }

    function updateStatus(job) {
        statusBox.style.display = 'block';
        jobIdEl.textContent = job.job_id || '-';
        jobStatusEl.textContent = job.status || '-';
        jobStatusEl.className = (job.status === 'completed')
            ? 'status-ok'
            : (job.status === 'failed' ? 'status-error' : '');

        if (job.total_cases !== null && job.total_cases !== undefined) {
            jobStatsEl.textContent = `Casos: ${job.total_cases} | Validos: ${job.valid_cases ?? 0} | Con error: ${job.error_cases ?? 0}`;
        } else {
            jobStatsEl.textContent = 'Procesamiento en curso...';
        }

        jobErrorEl.textContent = job.error ? `Error: ${job.error}` : '';
        jobErrorEl.className = job.error ? 'status-error' : '';
    }

    async function fetchJson(url, options = {}) {
        const response = await fetch(url, options);
        const isJson = (response.headers.get('content-type') || '').includes('application/json');
        const payload = isJson ? await response.json() : {};

        if (!response.ok) {
            throw new Error(payload.detail || payload.error || 'No se pudo completar la operacion');
        }
        return payload;
    }

    async function createJob(file) {
        const formData = new FormData();
        formData.append('file', file);
        return fetchJson('/jobs', {
            method: 'POST',
            body: formData
        });
    }

    async function getJob(jobId) {
        return fetchJson(`/jobs/${jobId}`);
    }

    async function pollJobNow() {
        if (!currentJobId) {
            return;
        }

        const job = await getJob(currentJobId);
        updateStatus(job);

        if (job.status === 'completed') {
            stopPolling();
            setProcessing(false, 'Completado');
            processBtn.textContent = 'Procesar otro PDF';
            fileInput.value = '';
            fileNameDisplay.textContent = 'Ningún archivo seleccionado';
            processBtn.style.display = 'none';

            if (job.download_url) {
                window.location.href = job.download_url;
            }
            return;
        }

        if (job.status === 'failed') {
            stopPolling();
            setProcessing(false, 'Fallido');
            throw new Error(job.error || 'El procesamiento fallo en el worker');
        }
    }

    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            fileNameDisplay.textContent = e.target.files[0].name;
            processBtn.style.display = 'block';
        } else {
            fileNameDisplay.textContent = 'Ningún archivo seleccionado';
            processBtn.style.display = 'none';
        }
    });

    processBtn.addEventListener('click', async function() {
        const file = fileInput.files[0];
        if (!file) {
            return;
        }

        stopPolling();
        currentJobId = null;
        statusBox.style.display = 'none';
        setProcessing(true, 'Creando job de procesamiento...');

        try {
            const createdJob = await createJob(file);
            currentJobId = createdJob.job_id;
            updateStatus(createdJob);

            setProcessing(true, 'Job creado. Procesando en worker...');
            pollTimer = setInterval(async () => {
                try {
                    await pollJobNow();
                } catch (pollError) {
                    stopPolling();
                    setProcessing(false, 'Fallido');
                    alert(`Ha ocurrido un error: ${pollError.message}`);
                }
            }, POLLING_MS);

            await pollJobNow();
        } catch (error) {
            console.error('Error:', error);
            alert(`Ha ocurrido un error: ${error.message}`);
            setProcessing(false, 'Error');
        } finally {
            if (!currentJobId) {
                stopPolling();
                setProcessing(false, 'Listo');
            }
        }
    });
</script>

</body>
</html>
