<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de PDF Institucional a Excel</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 {
            margin-bottom: 2rem;
            color: #2c3e50;
        }
        .upload-area {
            border: 2px dashed #3498db;
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            transition: background-color 0.3s ease;
        }
        .upload-area:hover {
            background-color: #f1f8ff;
        }
        #file-input {
            display: none;
        }
        .file-label {
            cursor: pointer;
            color: #3498db;
            font-weight: 600;
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #3498db;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .file-label:hover {
            background-color: #3498db;
            color: #fff;
        }
        .process-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s ease;
            display: none; /* Initially hidden */
        }
        .process-btn:hover {
            background-color: #27ae60;
        }
        .process-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .loader {
            display: none;
            margin-top: 15px;
            color: #7f8c8d;
        }
        .loader .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #file-name {
            display: block;
            margin-top: 10px;
            font-size: 0.9em;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Procesador de PDFs Institucionales</h2>
    
    <div class="upload-area">
        <input type="file" id="file-input" accept="application/pdf">
        <label for="file-input" class="file-label">📄 Seleccionar documento PDF</label>
        <span id="file-name">Ningún archivo seleccionado</span>
    </div>

    <button id="process-btn" class="process-btn">Subir y Procesar</button>
    
    <div id="loader" class="loader">
        <div class="spinner"></div>
        Procesando documento, por favor espere...
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    const processBtn = document.getElementById('process-btn');
    const loader = document.getElementById('loader');

    // Update filename when file is selected
    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            fileNameDisplay.textContent = e.target.files[0].name;
            processBtn.style.display = 'block';
        } else {
            fileNameDisplay.textContent = 'Ningún archivo seleccionado';
            processBtn.style.display = 'none';
        }
    });

    processBtn.addEventListener('click', async function() {
        const file = fileInput.files[0];
        if (!file) return;

        // UI changes for loading state
        processBtn.disabled = true;
        processBtn.textContent = 'Procesando...';
        loader.style.display = 'block';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/upload/', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                let errorMessage = 'Error al procesar el archivo.';
                try {
                    const payload = await response.json();
                    if (payload && payload.detail) {
                        errorMessage = payload.detail;
                    }
                } catch (_) {
                    // Si no viene JSON, mantenemos mensaje genérico.
                }
                throw new Error(errorMessage);
            }

            // Descargar automáticamente el excel
            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            
            // Extraer el nombre sugerido desde el Header si existe
            let outputFilename = file.name.replace('.pdf', '_procesado.xlsx');
            const contentDisposition = response.headers.get('Content-Disposition');
            if (contentDisposition && contentDisposition.indexOf('filename=') !== -1) {
                const matches = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/.exec(contentDisposition);
                if (matches != null && matches[1]) {
                    outputFilename = matches[1].replace(/['"]/g, '');
                }
            }

            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = outputFilename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            
            // Clean memory
            window.URL.revokeObjectURL(downloadUrl);

            alert('✅ Archivo procesado y descargado exitosamente');

        } catch (error) {
            console.error('Error:', error);
            alert(`Ha ocurrido un error: ${error.message}`);
        } finally {
            // Reset UI
            processBtn.disabled = false;
            processBtn.textContent = 'Subir y Procesar';
            loader.style.display = 'none';
            fileInput.value = '';
            fileNameDisplay.textContent = 'Ningún archivo seleccionado';
            processBtn.style.display = 'none';
        }
    });
</script>

</body>
</html>
